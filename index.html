<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>El-patron_ywobi Bot</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #1a1a2e);
      --text: var(--tg-theme-text-color, #eaeaea);
      --hint: var(--tg-theme-hint-color, #888);
      --link: var(--tg-theme-link-color, #6c63ff);
      --button: var(--tg-theme-button-color, #6c63ff);
      --button-text: var(--tg-theme-button-text-color, #fff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #16213e);
      --card-bg: #0f3460;
      --success: #00c853;
      --error: #ff5252;
      --warning: #ffd740;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: var(--secondary-bg);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .header .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--button);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header .info h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .header .info span {
      font-size: 12px;
      color: var(--hint);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-right: 4px;
    }

    /* Chat area */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--button);
      color: var(--button-text);
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      align-self: flex-start;
      background: var(--secondary-bg);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message.error {
      background: var(--error);
      color: white;
      align-self: center;
      font-size: 12px;
      border-radius: 8px;
    }

    .message img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 8px;
    }

    .typing-indicator {
      align-self: flex-start;
      background: var(--secondary-bg);
      padding: 12px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      display: none;
    }

    .typing-indicator.active { display: block; }

    .typing-indicator span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--hint);
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); }
      40% { transform: scale(1); }
    }

    /* Quick actions */
    .quick-actions {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      overflow-x: auto;
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .quick-action {
      padding: 8px 16px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      color: var(--text);
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .quick-action:active {
      background: var(--button);
      border-color: var(--button);
      transform: scale(0.95);
    }

    /* Input area */
    .input-container {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--secondary-bg);
      border-top: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .input-container input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.15);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-container input:focus {
      border-color: var(--button);
    }

    .input-container button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--button);
      color: var(--button-text);
      font-size: 20px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .input-container button:active {
      transform: scale(0.9);
    }

    .input-container button:disabled {
      opacity: 0.5;
    }

    /* Settings panel */
    .settings-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 85%;
      max-width: 350px;
      height: 100vh;
      background: var(--secondary-bg);
      z-index: 100;
      transition: right 0.3s ease;
      padding: 20px;
      overflow-y: auto;
      box-shadow: -4px 0 20px rgba(0,0,0,0.5);
    }

    .settings-panel.open { right: 0; }

    .settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 99;
      display: none;
    }

    .settings-overlay.active { display: block; }

    .settings-panel h3 {
      margin-bottom: 20px;
      font-size: 18px;
    }

    .setting-item {
      margin-bottom: 16px;
    }

    .setting-item label {
      display: block;
      font-size: 13px;
      color: var(--hint);
      margin-bottom: 6px;
    }

    .setting-item select,
    .setting-item input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .setting-item input[type="range"] {
      padding: 0;
      height: 6px;
      -webkit-appearance: none;
      background: var(--card-bg);
      border-radius: 3px;
      border: none;
    }

    .setting-item input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--button);
      cursor: pointer;
    }

    .close-settings {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
    }

    .settings-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* Scrollbar */
    .chat-container::-webkit-scrollbar { width: 4px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb { background: var(--hint); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h2>El-patron_ywobi Bot</h2>
      <span><span class="status-dot"></span>Online</span>
    </div>
    <button class="settings-btn" onclick="toggleSettings()" style="margin-left: auto;">⚙️</button>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions" id="quickActions">
    <div class="quick-action" onclick="sendQuick('/start')">👋 Start</div>
    <div class="quick-action" onclick="sendQuick('/help')">❓ Help</div>
    <div class="quick-action" onclick="sendQuick('/ping')">🏓 Ping</div>
    <div class="quick-action" onclick="sendQuick('/weather Nairobi')">🌤 Weather</div>
    <div class="quick-action" onclick="sendQuick('/image sunset')">🖼 Image</div>
    <div class="quick-action" onclick="sendQuick('/logs')">📋 Logs</div>
  </div>

  <!-- Chat Messages -->
  <div class="chat-container" id="chatContainer">
    <div class="message bot">
      👋 Hello! I'm El-patron_ywobi Bot.<br>
      Type a message or tap a quick action below.
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Input -->
  <div class="input-container">
    <input 
      type="text" 
      id="messageInput" 
      placeholder="Type a message..." 
      autocomplete="off"
      onkeypress="handleKeyPress(event)"
    >
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

  <!-- Settings Overlay -->
  <div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <button class="close-settings" onclick="toggleSettings()">✕</button>
    <h3>⚙️ Settings</h3>
    
    <div class="setting-item">
      <label>AI Provider</label>
      <select id="aiProvider" onchange="updateSettings()">
        <option value="groq">Groq (Llama 3.1)</option>
        <option value="openai">OpenAI (GPT-4)</option>
      </select>
    </div>

    <div class="setting-item">
      <label>Temperature: <span id="tempValue">0.7</span></label>
      <input type="range" id="temperature" min="0.1" max="1.0" step="0.1" value="0.7" oninput="updateTempLabel()">
    </div>

    <div class="setting-item">
      <label>Max Tokens</label>
      <input type="number" id="maxTokens" value="600" min="100" max="4096">
    </div>

    <div class="setting-item">
      <label>System Prompt (Personality)</label>
      <input type="text" id="systemPrompt" value="You are a helpful, concise assistant." placeholder="Enter AI personality...">
    </div>

    <button class="quick-action" style="width:100%;margin-top:12px;" onclick="applySettings()">💾 Apply Settings</button>
  </div>

  <script>
    // Initialize Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // Full screen

    // Theme colors are automatically applied via CSS variables

    // State
    let chatHistory = [];
    let isWaiting = false;

    // DOM elements
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    // Auto-focus input
    messageInput.focus();

    // Send message on Enter (Shift+Enter for new line)
    function handleKeyPress(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    // Quick action
    function sendQuick(text) {
      messageInput.value = text;
      sendMessage();
    }

    // Add message to chat
    function addMessage(text, type = 'user') {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${type}`;
      msgDiv.innerHTML = text.replace(/\n/g, '<br>');
      chatContainer.insertBefore(msgDiv, typingIndicator);
      scrollToBottom();
    }

    // Show/hide typing
    function showTyping() {
      typingIndicator.classList.add('active');
      scrollToBottom();
    }

    function hideTyping() {
      typingIndicator.classList.remove('active');
    }

    // Scroll to bottom
    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Send message
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || isWaiting) return;

      // Clear input
      messageInput.value = '';
      isWaiting = true;
      sendBtn.disabled = true;

      // Add user message
      addMessage(text, 'user');
      
      // Add to history
      chatHistory.push({ role: 'user', content: text });

      // Show typing
      showTyping();

      try {
        // Send to bot via Telegram Web App data
        // This will close the Mini App and send data to the bot
        tg.sendData(JSON.stringify({
          action: 'user_message',
          text: text,
          history: chatHistory.slice(-10) // Send last 10 messages for context
        }));

        // Note: The Mini App will close after tg.sendData()
        // The bot will reply in the main chat
        // To keep the app open, use a direct API call instead (requires bot HTTP server)
        
      } catch (error) {
        hideTyping();
        addMessage('❌ Error: Could not send message. Please try again.', 'error');
        isWaiting = false;
        sendBtn.disabled = false;
      }
    }

    // Settings
    function toggleSettings() {
      const panel = document.getElementById('settingsPanel');
      const overlay = document.getElementById('settingsOverlay');
      panel.classList.toggle('open');
      overlay.classList.toggle('active');
    }

    function updateTempLabel() {
      document.getElementById('tempValue').textContent = document.getElementById('temperature').value;
    }

    function updateSettings() {
      // Can save to localStorage for persistence
      const settings = {
        provider: document.getElementById('aiProvider').value,
        temperature: document.getElementById('temperature').value,
        maxTokens: document.getElementById('maxTokens').value,
        systemPrompt: document.getElementById('systemPrompt').value,
      };
      localStorage.setItem('botSettings', JSON.stringify(settings));
      addMessage('⚙️ Settings saved locally.', 'bot');
      toggleSettings();
    }

    function applySettings() {
      updateSettings();
    }

    // Load saved settings
    function loadSettings() {
      const saved = localStorage.getItem('botSettings');
      if (saved) {
        const settings = JSON.parse(saved);
        document.getElementById('aiProvider').value = settings.provider || 'groq';
        document.getElementById('temperature').value = settings.temperature || 0.7;
        document.getElementById('maxTokens').value = settings.maxTokens || 600;
        document.getElementById('systemPrompt').value = settings.systemPrompt || 'You are a helpful, concise assistant.';
        updateTempLabel();
      }
    }

    // Handle incoming data from bot (if using direct API)
    // This would be used if the bot has an HTTP endpoint
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'bot_response') {
        hideTyping();
        addMessage(event.data.text, 'bot');
        chatHistory.push({ role: 'assistant', content: event.data.text });
        isWaiting = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    });

    // Initialize
    loadSettings();
    messageInput.focus();

    // Handle back button
    tg.BackButton.onClick(() => {
      tg.close();
    });
  </script>
</body>
</html>
