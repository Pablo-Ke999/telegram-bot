<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Elpatron AI Bot</title>

    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            padding-bottom: 8px;
            max-height: calc(100vh - 140px);
        }
        .message {
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        .message.user {
            align-self: flex-end;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            align-self: flex-start;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
            border-bottom-left-radius: 4px;
        }
        .message.system {
            align-self: center;
            background: transparent;
            color: var(--tg-theme-hint-color, #888888);
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 12px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #input-area {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            border-top: 1px solid var(--tg-theme-section-separator-color, #ccc);
            background: var(--tg-theme-bg-color, #ffffff);
            position: sticky;
            bottom: 0;
        }
        #message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--tg-theme-section-separator-color, #ccc);
            border-radius: 24px;
            outline: none;
            font-size: 1rem;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
        }
        #send-btn {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 24px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #send-btn:active { opacity: 0.7; }
        #send-btn:disabled { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <div id="input-area">
        <input type="text" id="message-input" placeholder="Type a message..." autofocus>
        <button id="send-btn">Send</button>
    </div>

    <script>
        // ============================================================
        // 1. TELEGRAM WEBAPP INIT
        // ============================================================
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Use full screen height

        // ============================================================
        // 2. PERFORMANCE OPTIMIZER (Buffer & Memory Fix)
        // ============================================================
        (function() {
            'use strict';

            // ---- 2a. Circular Buffer ----
            class MessageBuffer {
                constructor(maxSize = 50) {
                    this.maxSize = maxSize;
                    this.messages = [];
                }
                add(msg) {
                    this.messages.push(msg);
                    if (this.messages.length > this.maxSize) {
                        const removed = this.messages.shift();
                        const elem = document.getElementById(`msg-${removed.id}`);
                        if (elem) elem.remove();
                    }
                    return this.messages;
                }
                getAll() { return this.messages; }
                clear() { this.messages = []; }
            }
            window.chatBuffer = new MessageBuffer(50);

            // ---- 2b. Throttled viewport updates ----
            let pendingUpdate = false;
            let latestEventData = null;

            function throttledUpdate(data) {
                latestEventData = data;
                if (!pendingUpdate) {
                    pendingUpdate = true;
                    requestAnimationFrame(() => {
                        if (latestEventData) {
                            // Adapt UI to viewport changes if needed
                            // e.g., document.getElementById('chat-container').style.height = ...
                        }
                        pendingUpdate = false;
                    });
                }
            }

            if (tg) {
                tg.onEvent('viewportChanged', (data) => {
                    throttledUpdate(data);
                });

                tg.onEvent('viewportChanged', () => {
                    if (!tg.isExpanded) {
                        window.chatBuffer.clear();
                        if (window._pollingInterval) {
                            clearInterval(window._pollingInterval);
                            window._pollingInterval = null;
                        }
                    }
                });
            }

            // ---- 2c. Smart fetch with abort ----
            let activeController = null;
            window.smartFetch = async function(url, options = {}) {
                if (activeController) activeController.abort();
                activeController = new AbortController();
                try {
                    const response = await fetch(url, {
                        ...options,
                        signal: activeController.signal
                    });
                    activeController = null;
                    return await response.json();
                } catch (error) {
                    if (error.name === 'AbortError') return null;
                    throw error;
                }
            };

            // ---- 2d. Production logging off ----
            window.isProduction = true;
            const originalLog = console.log;
            window.console.log = function() {
                if (!window.isProduction) {
                    originalLog.apply(console, arguments);
                }
            };
            console.log('Optimizer loaded.');

        })();

        // ============================================================
        // 3. CHAT UI LOGIC
        // ============================================================
        const chatContainer = document.getElementById('chat-container');
        const input = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        let messageCounter = 0;

        // ---- 3a. Render a message ----
        function addMessage(text, sender = 'user', extra = {}) {
            const msgId = ++messageCounter;
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.id = `msg-${msgId}`;
            div.textContent = text;
            chatContainer.appendChild(div);

            // Store in buffer with ID for later removal
            window.chatBuffer.add({ id: msgId, text, sender, ...extra });

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // ---- 3b. Simulate bot reply (replace with real API call) ----
        async function getBotReply(userMessage) {
            // If you have a real backend, use smartFetch here:
            // const data = await window.smartFetch('https://your-bot-api.com/chat', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({ message: userMessage })
            // });
            // return data.reply;

            // For demo – echo with a twist
            const replies = [
                "That's interesting! Tell me more.",
                "I see. How does that make you feel?",
                "Got it! Let me think about that...",
                "Thanks for sharing! 😊",
                "Wow, that's deep. What else?",
                "I'm here to listen. Keep going!"
            ];
            const random = replies[Math.floor(Math.random() * replies.length)];
            return `🤖 ${random}`;
        }

        // ---- 3c. Send message ----
        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // Disable UI
            sendBtn.disabled = true;
            input.value = '';
            input.focus();

            // Add user message
            addMessage(text, 'user');

            // Add a typing indicator (optional)
            const typingId = ++messageCounter;
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot system';
            typingDiv.id = `msg-${typingId}`;
            typingDiv.textContent = '… typing …';
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            // Get bot reply
            try {
                const reply = await getBotReply(text);
                // Remove typing indicator
                const typingEl = document.getElementById(`msg-${typingId}`);
                if (typingEl) typingEl.remove();

                // Add bot message
                addMessage(reply, 'bot');
            } catch (error) {
                // Remove typing, show error
                const typingEl = document.getElementById(`msg-${typingId}`);
                if (typingEl) typingEl.remove();
                addMessage('⚠️ Error: could not reach bot.', 'bot');
                console.error(error);
            } finally {
                sendBtn.disabled = false;
            }
        }

        // ---- 3d. Event listeners ----
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        // ---- 3e. Welcome message ----
        addMessage('Hello! I\'m El-patron_ywobi Bot. How can I assist you today?', 'bot');

        // ============================================================
        // 4. FINAL TELEGRAM INTERACTION (Optional)
        // ============================================================
        // Close the Mini App when the user taps "Close" in the header
        tg.onEvent('mainButtonClicked', () => {
            tg.close();
        });

        // If you have a main button, configure it:
        // tg.MainButton.setText('Close').show();

        console.log('Mini App fully loaded.');
    </script>
</body>
</html>
