<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>El-patron_ywobi Bot</title>
    
    <!-- Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #0f0f1a);
            color: var(--tg-theme-text-color, #ffffff);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s;
        }

        /* ===== HEADER (Attractive Gradient) ===== */
        .app-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 16px 20px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 210, 255, 0.3);
        }

        .bot-info h2 {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.2;
            color: #fff;
        }

        .bot-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #6cff8a;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #6cff8a;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.4; transform: scale(0.9); }
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .header-btn:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        /* ===== CHAT MESSAGES AREA ===== */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
            background: var(--tg-theme-secondary-bg-color, #14141f);
        }

        /* ===== MESSAGE BUBBLES ===== */
        .message {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeInUp 0.25s ease;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #0088cc, #005f8a);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--tg-theme-bg-color, #1e1e2f);
            color: var(--tg-theme-text-color, #f0f0f0);
            border: 1px solid rgba(255,255,255,0.06);
            border-bottom-left-radius: 4px;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== INPUT FOOTER ===== */
        .input-footer {
            padding: 10px 14px 16px;
            background: var(--tg-theme-bg-color, #0f0f1a);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .input-footer input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--tg-theme-secondary-bg-color, #1c1c2e);
            color: var(--tg-theme-text-color, #fff);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        .input-footer input:focus {
            border-color: #0088cc;
            box-shadow: 0 0 0 3px rgba(0, 136, 204, 0.25);
        }
        .input-footer input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #0088cc, #005f8a);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(0, 136, 204, 0.35);
            flex-shrink: 0;
        }
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.5);
        }
        .send-btn:active {
            transform: scale(0.94);
        }

        .clear-btn {
            background: rgba(255, 70, 70, 0.15);
            border: none;
            color: #ff6b6b;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .clear-btn:hover {
            background: rgba(255, 70, 70, 0.25);
        }

        /* Scrollbar styling */
        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="app-header">
        <div class="header-left">
            <div class="bot-avatar">🤖</div>
            <div class="bot-info">
                <h2>El-patron_ywobi</h2>
                <div class="bot-status">
                    <span class="status-dot"></span> Online
                </div>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn" id="clearChatBtn">🗑️ Clear</button>
        </div>
    </header>

    <!-- ===== CHAT ===== -->
    <div class="chat-container" id="chatContainer">
        <!-- Messages will be injected here -->
    </div>

    <!-- ===== INPUT ===== -->
    <footer class="input-footer">
        <input type="text" id="messageInput" placeholder="Type a message..." autofocus />
        <button class="send-btn" id="sendBtn">➤</button>
    </footer>

    <script>
        // ================================================================
        // 1. TELEGRAM WEBAPP INIT
        // ================================================================
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Expand to full screen

        // ================================================================
        // 2. PERFORMANCE OPTIMIZER (Integrated with beautiful console logs)
        // ================================================================
        (function() {
            'use strict';

            // --- 2a. STYLISH, RATE-LIMITED CONSOLE LOGS ---
            // Keeps logs attractive but prevents buffer overflow.
            let _logCounter = 0;
            const MAX_LOGS_PER_SECOND = 5;
            let _logTimestamps = [];

            function smartLog(level, ...args) {
                const now = Date.now();
                // Clean old timestamps
                _logTimestamps = _logTimestamps.filter(t => now - t < 1000);
                
                if (_logTimestamps.length >= MAX_LOGS_PER_SECOND) {
                    return; // Silent throttle – prevents buffer bloat
                }
                _logTimestamps.push(now);

                const prefix = `%c[El-patron]%c 🚀`;
                const style1 = 'color: #00d2ff; font-weight: bold; font-size: 12px;';
                const style2 = 'color: #a0a0b0; font-size: 11px;';
                
                if (level === 'info') {
                    console.log(prefix, style1, style2, ...args);
                } else if (level === 'warn') {
                    console.warn(prefix, style1, style2, ...args);
                } else if (level === 'error') {
                    console.error(prefix, style1, style2, ...args);
                } else {
                    console.log(prefix, style1, style2, ...args);
                }
            }

            // Expose logger globally
            window.appLog = {
                info: (...args) => smartLog('info', ...args),
                warn: (...args) => smartLog('warn', ...args),
                error: (...args) => smartLog('error', ...args)
            };

            appLog.info('✅ Mini App initialized successfully.');

            // --- 2b. CIRCULAR BUFFER (Keeps only last 50 messages) ---
            class MessageBuffer {
                constructor(maxSize = 50) {
                    this.maxSize = maxSize;
                    this.messages = [];
                    this.idCounter = 0;
                }

                add(text, sender) {
                    const msg = {
                        id: this.idCounter++,
                        text: text.trim(),
                        sender: sender, // 'user' or 'bot'
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    };
                    this.messages.push(msg);
                    
                    // Enforce limit
                    if (this.messages.length > this.maxSize) {
                        const removed = this.messages.shift();
                        // Remove from DOM
                        const elem = document.getElementById(`msg-${removed.id}`);
                        if (elem) elem.remove();
                        appLog.info(`🗑️ Removed old message #${removed.id} to keep buffer lean.`);
                    }
                    
                    appLog.info(`📩 New ${sender} message: "${msg.text.slice(0, 20)}..."`);
                    return msg;
                }

                getAll() { return this.messages; }
                
                clear() {
                    const count = this.messages.length;
                    this.messages = [];
                    document.getElementById('chatContainer').innerHTML = '';
                    appLog.info(`🧹 Cleared ${count} messages from buffer.`);
                }
            }

            window.chatBuffer = new MessageBuffer(50);

            // --- 2c. THROTTLED UI UPDATES ---
            let pendingUpdate = false;
            let latestHeight = null;

            function throttledViewportUpdate(data) {
                latestHeight = data?.height || window.innerHeight;
                if (!pendingUpdate) {
                    pendingUpdate = true;
                    requestAnimationFrame(() => {
                        // Smoothly adjust container if needed
                        const container = document.getElementById('chatContainer');
                        if (container) {
                            // Just a visual tweak – nothing heavy
                        }
                        pendingUpdate = false;
                    });
                }
            }

            // --- 2d. TELEGRAM EVENT HOOKS ---
            if (tg) {
                tg.onEvent('viewportChanged', (data) => {
                    throttledViewportUpdate(data);
                    // Log only once every few events (throttled naturally by smartLog)
                    appLog.info(`📐 Viewport changed: ${data.height}px`);
                });

                // Cleanup on close
                tg.onEvent('viewportChanged', () => {
                    if (!tg.isExpanded) {
                        window.chatBuffer.clear();
                        appLog.info('🛑 App minimized/closed. Buffer cleared.');
                    }
                });
            }

            // --- 2e. SMART FETCH (Abort previous requests) ---
            let activeController = null;
            window.smartFetch = async function(url, options = {}) {
                if (activeController) activeController.abort();
                activeController = new AbortController();
                try {
                    const resp = await fetch(url, { ...options, signal: activeController.signal });
                    activeController = null;
                    appLog.info(`🌐 Fetched ${url} successfully.`);
                    return await resp.json();
                } catch (e) {
                    if (e.name === 'AbortError') {
                        appLog.warn('⏹️ Fetch aborted (duplicate request).');
                        return null;
                    }
                    appLog.error('❌ Fetch error:', e);
                    throw e;
                }
            };

            // Override default console.log to use our smart logger silently
            // We keep original console for emergencies, but redirect to our throttled version.
            const originalLog = console.log;
            console.log = function(...args) {
                // Only forward if it's not our own internal logging to avoid recursion
                if (args.length > 0 && typeof args[0] === 'string' && args[0].includes('[El-patron]')) {
                    return;
                }
                appLog.info('[Console]', ...args);
            };

            appLog.info('⚡ Performance Optimizer & Logger loaded.');

        })();

        // ================================================================
        // 3. CHAT UI LOGIC (Renders messages beautifully)
        // ================================================================
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // --- Render a message ---
        function renderMessage(msg) {
            const div = document.createElement('div');
            div.className = `message ${msg.sender}`;
            div.id = `msg-${msg.id}`;
            div.innerHTML = `
                ${msg.text}
                <span class="time">${msg.time}</span>
            `;
            chatContainer.appendChild(div);
            // Auto-scroll
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // --- Send a new message ---
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            // 1. Add user message to buffer & render
            const userMsg = window.chatBuffer.add(text, 'user');
            renderMessage(userMsg);

            // 2. Simulate bot reply (Replace this with your actual API call)
            setTimeout(() => {
                const botReplies = [
                    "That's interesting! Tell me more 🤔",
                    "Got it! How can I help with that?",
                    "Life is full of surprises, isn't it? ✨",
                    "I'm processing that... just kidding, I'm a bot! 😄",
                    "Great point! Keep chatting with me."
                ];
                const reply = botReplies[Math.floor(Math.random() * botReplies.length)];
                const botMsg = window.chatBuffer.add(reply, 'bot');
                renderMessage(botMsg);
            }, 400);

            // 3. Clear input
            messageInput.value = '';
            messageInput.focus();
        }

        // --- Clear chat manually ---
        document.getElementById('clearChatBtn').addEventListener('click', () => {
            window.chatBuffer.clear();
            appLog.info('🧹 User cleared the chat.');
        });

        // --- Event listeners ---
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // ================================================================
        // 4. BOOT MESSAGE
        // ================================================================
        // Add a welcome message when the app loads
        setTimeout(() => {
            const welcome = window.chatBuffer.add('Hello! I\'m El-patron_ywobi Bot. Ask me anything! 🤖', 'bot');
            renderMessage(welcome);
            appLog.info('👋 Welcome message displayed.');
        }, 300);

        // Log final confirmation
        console.log('🚀 Mini App is fully ready and visually stunning!');
    </script>
</body>
</html>
