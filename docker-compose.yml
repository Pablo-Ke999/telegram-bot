version: '3.8'

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-ai-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-groq}
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./config.yaml:/app/config.yaml
      - ./uploads:/app/uploads
    ports:
      - "3000:3000"
    networks:
      - bot-network
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  bot-network:
    driver: bridge
