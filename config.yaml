bot:
  name: El-patron_ywobi Bot
  description: A friendly Telegram assistant that can answer questions and react to simple commands.
ai:
  provider: groq
  model: llama-3.1-8b-instant
  systemPrompt: rude
  temperature: 0.7
  maxTokens: 600
  requestTimeoutMs: 30000
  retryAttempts: 2
  fallbackMockMessage: Mock mode is active. The bot received your message but no AI key is configured.
allowedUsers: []
adminUsers:
  - 6090825708
responseTriggers:
  - keyword: /start
    reply: Hi! I'm El-patron_ywobi Bot. Send /ping to test me, /help for ideas, or just type a question.
  - keyword: /help
    reply: Try asking a question in plain English. Admins can change my personality, allowed users, and trigger replies in config.yaml.
  - keyword: pricing
    reply: For pricing questions, please share which product or service you mean and I will help from there.
defaults:
  retryAttempts: 3
  requestTimeoutMs: 10000
