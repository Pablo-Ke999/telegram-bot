# =============================================================================
#  BOT IDENTITY
# =============================================================================
bot:
  name: El-patron_ywobi Bot
  description: A friendly Telegram assistant that can answer questions and react to simple commands.

# =============================================================================
#  AI / LLM SETTINGS  (provider: groq)
# =============================================================================
ai:
  provider: groq
  model: llama-3.1-8b-instant
  systemPrompt: |
    You are a helpful, concise Telegram assistant.
    If the user asks you to create, draw, or generate an image, photo, or picture,
    do NOT output ASCII art, Python code, or long descriptions.
    Instead, reply exactly:
    "I can't create images directly, but you can use the /image command to generate a photorealistic photo. Example: /image a cute cat sitting on a couch."
    Keep all other replies short and friendly.
  temperature: 0.7
  maxTokens: 600
  requestTimeoutMs: 30000
  retryAttempts: 2
  fallbackMockMessage: Mock mode is active. The bot received your message but no AI key is configured.

# =============================================================================
#  SECURITY (leave empty to allow everyone)
# =============================================================================
allowedUsers: []

# =============================================================================
#  ADMIN USERS (can use sensitive commands like /logs, /broadcast, /setpersona)
# =============================================================================
adminUsers:
  - 6090825708

# =============================================================================
#  RESPONSE TRIGGERS (exact match, no AI needed)
# =============================================================================
responseTriggers:
  - keyword: /start
    reply: Hi! I'm El-patron_ywobi Bot. Send /ping to test me, /help for ideas, or just type a question.
  - keyword: pricing
    reply: For pricing questions, please share which product or service you mean and I will help from there.

# =============================================================================
#  DEFAULTS
# =============================================================================
defaults:
  retryAttempts: 3
  requestTimeoutMs: 10000

# =============================================================================
#  FEATURES
# =============================================================================
features:
  enableToolCalling: true